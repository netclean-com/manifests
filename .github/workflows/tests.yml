name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    strategy:
      matrix:
        os: [ macos-26, macos-26-intel ]
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax
        if: ${{ matrix.os == 'macos-26' }} # Temporary workaround for internal Homebrew bug: https://github.com/homebrew/brew/issues/22098

      - run: brew style --cask --tap="$GITHUB_REPOSITORY"

      - run: brew audit --cask --strict --tap="$GITHUB_REPOSITORY"
        if: github.event_name == 'pull_request'

      - name: Fetch preview cask (verifies CDN URL and SHA256 checksum)
        if: github.event_name == 'pull_request'
        run: brew fetch --cask netclean-com/manifests/netclean-monitor-preview
