name: Cask CI

on:
  pull_request:
    paths:
      - 'Casks/netclean-monitor-preview.rb'

jobs:
  test-cask:
    runs-on: macos-26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Register tap from local checkout
        run: brew tap netclean-com/manifests "$(pwd)"

      - name: Style and audit changed casks
        run: |
          for cask in $(git diff --name-only origin/main | grep 'Casks/netclean-monitor-preview\.rb'); do
            cask_name=$(basename "$cask" .rb)
            brew style "$cask"
            brew audit --cask --strict --online "netclean-com/manifests/$cask_name"
          done

      - name: Verify SHA256 of changed casks
        run: |
          for cask in $(git diff --name-only origin/main | grep 'Casks/netclean-monitor-preview\.rb'); do
            cask_name=$(basename "$cask" .rb)
            brew fetch --cask "netclean-com/manifests/$cask_name"
          done

