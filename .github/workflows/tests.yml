name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    strategy:
      matrix:
        os: [ macos-26, macos-26-intel ]
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      # Rust is required for rubydex, which is a dependency of Homebrew's test-bot. We only need to install it on
      # Intel macOS, as Apple Silicon macOS comes with Rust pre-installed.
      - name: Install Rust (Cargo) for rubydex
        if: matrix.os == 'macos-26-intel'
        run: |
          brew update
          brew install rust
          cargo --version

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax
      - run: brew audit --cask --tap="$GITHUB_REPOSITORY"
        if: github.event_name == 'pull_request'
